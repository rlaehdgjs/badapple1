<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>블록 퍼즐 게임</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <!-- 점수판 -->
    <div class="score-board">
      <div class="score-info">
        <div class="score-item">
          <span class="label">현재 점수</span>
          <span class="value" id="currentScore">0</span>
        </div>
        <div class="score-item">
          <span class="label">최고 점수</span>
          <span class="value" id="bestScore">0</span>
        </div>
      </div>
      <div class="combo-display">
        <span class="label">배수</span>
        <span class="multiplier" id="multiplier">x1</span>
      </div>
    </div>

    <!-- 게임 보드 -->
    <div class="game-board" id="gameBoard"></div>

    <!-- 블록 대기열 -->
    <div class="queue-section">
      <div class="label">다음 블록</div>
      <div class="queue-container" id="queueContainer"></div>
    </div>
  </div>

  <!-- 게임 오버 팝업 -->
  <div class="modal" id="gameOverModal" style="display: none;">
    <div class="modal-content">
      <h2>게임 오버!</h2>
      <p>최종 점수: <span id="finalScore">0</span></p>
      <button id="restartBtn">다시 시작</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
